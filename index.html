<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda da Turma</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #eeede9;
      --text: #1a1a18;
      --text-secondary: #6b6b68;
      --text-tertiary: #9a9a96;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg-secondary: #252523;
        --bg-tertiary: #2e2e2b;
        --text: #f0efe9;
        --text-secondary: #a0a09c;
        --text-tertiary: #6b6b68;
        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.2);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-tertiary);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* Login */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
    }

    .login-card {
      background: var(--bg);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-lg);
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 1.75rem;
    }

    .login-field { margin-bottom: 12px; text-align: left; }
    .login-field label { font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 5px; }
    .login-field input {
      width: 100%;
      font-size: 15px;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      background: var(--bg-secondary);
      color: var(--text);
      font-family: var(--font);
      outline: none;
      letter-spacing: 0.08em;
    }
    .login-field input:focus { border-color: var(--text-secondary); }

    .login-error {
      font-size: 13px;
      color: #E24B4A;
      margin-bottom: 10px;
      min-height: 18px;
    }

    .btn-login {
      width: 100%;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-md);
      padding: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font);
      margin-top: 4px;
    }
    .btn-login:hover { opacity: 0.85; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    /* App */
    #app-screen { display: none; }

    .container { max-width: 680px; margin: 0 auto; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 12px;
    }

    .title { font-size: 24px; font-weight: 600; color: var(--text); }
    .subtitle { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    .btn-add {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-md);
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font);
    }
    .btn-add:hover { opacity: 0.82; }

    .btn-logout {
      background: transparent;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      padding: 9px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-secondary);
      font-family: var(--font);
    }
    .btn-logout:hover { color: var(--text); }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .filter-btn {
      border: 0.5px solid var(--border-md);
      background: var(--bg);
      border-radius: 20px;
      padding: 6px 15px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-secondary);
      font-family: var(--font);
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin: 1.5rem 0 8px;
    }

    .items-list { display: flex; flex-direction: column; gap: 8px; }

    .item-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .item-card.overdue  { border-left: 3px solid #E24B4A; }
    .item-card.today    { border-left: 3px solid #1D9E75; }
    .item-card.upcoming { border-left: 3px solid #378ADD; }

    .type-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge-prova     { background: #FAECE7; color: #993C1D; }
    .badge-trabalho  { background: #E6F1FB; color: #185FA5; }
    .badge-atividade { background: #EAF3DE; color: #3B6D11; }
    .badge-evento    { background: #FAEEDA; color: #854F0B; }

    .item-info { flex: 1; min-width: 0; }
    .item-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-meta { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    .item-date {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      text-align: right;
      line-height: 1.4;
    }
    .item-date .days-label { font-size: 11px; }
    .item-date.overdue { color: #E24B4A; font-weight: 500; }
    .item-date.today   { color: #1D9E75; font-weight: 500; }

    .btn-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 18px;
      padding: 4px;
      line-height: 1;
      font-family: var(--font);
    }
    .btn-del:hover { color: #E24B4A; }

    .empty {
      text-align: center;
      padding: 3.5rem 0;
      color: var(--text-secondary);
      font-size: 15px;
    }

    .loading {
      text-align: center;
      padding: 3rem 0;
      color: var(--text-tertiary);
      font-size: 14px;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      width: 100%;
      max-width: 440px;
      border: 0.5px solid var(--border-md);
    }
    .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 1.25rem; color: var(--text); }

    .field { margin-bottom: 14px; }
    .field label { font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 5px; }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      font-size: 14px;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      padding: 9px 11px;
      background: var(--bg-secondary);
      color: var(--text);
      font-family: var(--font);
      outline: none;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus { border-color: var(--text-secondary); }
    .field textarea { resize: vertical; min-height: 65px; }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 1.25rem;
      justify-content: flex-end;
    }
    .btn-cancel {
      border: 0.5px solid var(--border-md);
      background: transparent;
      border-radius: var(--radius-md);
      padding: 9px 18px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text-secondary);
      font-family: var(--font);
    }
    .btn-save {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-md);
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font);
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 480px) {
      .item-card { flex-wrap: wrap; }
      .item-date { text-align: left; }
    }
  </style>
</head>
<body>

  <!-- Tela de login -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-title">Agenda da Turma</div>
      <div class="login-subtitle">Digite a senha para acessar</div>
      <div class="login-field">
        <label>Senha</label>
        <input type="password" id="senha-input" placeholder="••••••••" />
      </div>
      <div class="login-error" id="login-error"></div>
      <button class="btn-login" id="btn-login" onclick="fazerLogin()">Entrar</button>
    </div>
  </div>

  <!-- App principal -->
  <div id="app-screen">
    <div class="container">
      <div class="header">
        <div>
          <div class="title">Agenda da Turma</div>
          <div class="subtitle">Provas, trabalhos, atividades e eventos</div>
        </div>
        <div class="header-actions">
          <button class="btn-logout" onclick="fazerLogout()">Sair</button>
          <button class="btn-add" onclick="openModal()">+ Adicionar</button>
        </div>
      </div>

      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('todos', this)">Todos</button>
        <button class="filter-btn" onclick="setFilter('prova', this)">Provas</button>
        <button class="filter-btn" onclick="setFilter('trabalho', this)">Trabalhos</button>
        <button class="filter-btn" onclick="setFilter('atividade', this)">Atividades</button>
        <button class="filter-btn" onclick="setFilter('evento', this)">Eventos</button>
      </div>

      <div id="list"><div class="loading">Carregando...</div></div>
    </div>
  </div>

  <!-- Modal novo item -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-title">Novo item</div>
      <div class="field">
        <label>Título</label>
        <input type="text" id="f-title" placeholder="Ex: Prova de Direito Tributário" />
      </div>
      <div class="field">
        <label>Tipo</label>
        <select id="f-type">
          <option value="prova">Prova</option>
          <option value="trabalho">Trabalho</option>
          <option value="atividade">Atividade</option>
          <option value="evento">Evento</option>
        </select>
      </div>
      <div class="field">
        <label>Matéria / Disciplina</label>
        <input type="text" id="f-subject" placeholder="Ex: Direito Civil" />
      </div>
      <div class="field">
        <label>Data</label>
        <input type="date" id="f-date" />
      </div>
      <div class="field">
        <label>Observações (opcional)</label>
        <textarea id="f-notes" placeholder="Conteúdo, local, instruções..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" id="btn-save" onclick="saveItem()">Salvar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAcSUG2e5wEun9cWREpO4fakOmhfD1nW7o",
      authDomain: "escola-agenda-4df52.firebaseapp.com",
      projectId: "escola-agenda-4df52",
      storageBucket: "escola-agenda-4df52.firebasestorage.app",
      messagingSenderId: "490841183749",
      appId: "1:490841183749:web:2422de85c95ccf8cfcee6c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "agenda");

    const SESSION_KEY = 'agenda_auth';
    let items = [];
    let currentFilter = 'todos';
    let unsubscribe = null;

    // Verifica sessão salva
    if (sessionStorage.getItem(SESSION_KEY) === '1') {
      mostrarApp();
    }

    async function fazerLogin() {
      const senha = document.getElementById('senha-input').value.trim();
      if (!senha) return;

      const btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.textContent = 'Verificando...';
      document.getElementById('login-error').textContent = '';

      try {
        const docSnap = await getDoc(doc(db, "config", "acesso"));
        if (!docSnap.exists()) {
          document.getElementById('login-error').textContent = 'Configuração não encontrada no Firebase.';
          return;
        }
        const senhaCorreta = docSnap.data().senha;
        if (senha === senhaCorreta) {
          sessionStorage.setItem(SESSION_KEY, '1');
          mostrarApp();
        } else {
          document.getElementById('login-error').textContent = 'Senha incorreta. Tente novamente.';
          document.getElementById('senha-input').value = '';
          document.getElementById('senha-input').focus();
        }
      } catch(e) {
        console.error(e);
        document.getElementById('login-error').textContent = 'Erro ao conectar. Verifique o console.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }
    window.fazerLogin = fazerLogin;

    function fazerLogout() {
      sessionStorage.removeItem(SESSION_KEY);
      if (unsubscribe) unsubscribe();
      document.getElementById('app-screen').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('senha-input').value = '';
    }
    window.fazerLogout = fazerLogout;

    function mostrarApp() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'block';
      iniciarDados();
    }

    function iniciarDados() {
      if (unsubscribe) return;
      const q = query(colRef, orderBy("date", "asc"));
      unsubscribe = onSnapshot(q, (snapshot) => {
        items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        render();
      }, (err) => {
        console.error(err);
        document.getElementById('list').innerHTML = '<div class="empty">Erro ao carregar dados.</div>';
      });
    }

    // Enter no campo de senha
    document.getElementById('senha-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') fazerLogin();
    });

    function setFilter(f, el) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      render();
    }
    window.setFilter = setFilter;

    function dateStatus(dateStr) {
      const today = new Date(); today.setHours(0,0,0,0);
      const d = new Date(dateStr + 'T00:00:00');
      if (d < today) return 'overdue';
      if (d.getTime() === today.getTime()) return 'today';
      return 'upcoming';
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function daysLabel(dateStr) {
      const today = new Date(); today.setHours(0,0,0,0);
      const d = new Date(dateStr + 'T00:00:00');
      const diff = Math.round((d - today) / 86400000);
      if (diff < 0) return Math.abs(diff) + 'd atrás';
      if (diff === 0) return 'hoje';
      if (diff === 1) return 'amanhã';
      return 'em ' + diff + ' dias';
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function render() {
      const list = document.getElementById('list');
      let filtered = currentFilter === 'todos' ? items : items.filter(i => i.type === currentFilter);
      filtered = [...filtered].sort((a, b) => a.date.localeCompare(b.date));

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">Nenhum item encontrado.<br><span style="font-size:13px">Clique em "+ Adicionar" para começar.</span></div>';
        return;
      }

      const groups = {};
      filtered.forEach(item => {
        const s = dateStatus(item.date);
        if (!groups[s]) groups[s] = [];
        groups[s].push(item);
      });

      const order = ['overdue', 'today', 'upcoming'];
      const labels = { overdue: 'Atrasados', today: 'Hoje', upcoming: 'Próximos' };
      const typeLabels = { prova: 'Prova', trabalho: 'Trabalho', atividade: 'Atividade', evento: 'Evento' };

      let html = '';
      order.forEach(g => {
        if (!groups[g]) return;
        html += '<div class="section-label">' + labels[g] + '</div><div class="items-list" style="margin-bottom:0.25rem">';
        groups[g].forEach(item => {
          const st = dateStatus(item.date);
          const meta = [item.subject, item.notes].filter(Boolean).join(' · ');
          html += `
            <div class="item-card ${st}">
              <span class="type-badge badge-${item.type}">${typeLabels[item.type] || item.type}</span>
              <div class="item-info">
                <div class="item-title">${escHtml(item.title)}</div>
                ${meta ? '<div class="item-meta">' + escHtml(meta) + '</div>' : ''}
              </div>
              <div class="item-date ${st}">
                ${formatDate(item.date)}<br>
                <span class="days-label">${daysLabel(item.date)}</span>
              </div>
              <button class="btn-del" data-id="${item.id}" title="Remover">×</button>
            </div>`;
        });
        html += '</div>';
      });

      list.innerHTML = html;
      list.querySelectorAll('.btn-del').forEach(btn => {
        btn.addEventListener('click', () => deleteItem(btn.dataset.id));
      });
    }

    function openModal() {
      document.getElementById('f-title').value = '';
      document.getElementById('f-subject').value = '';
      document.getElementById('f-notes').value = '';
      document.getElementById('f-type').value = 'prova';
      document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
      document.getElementById('modal').classList.add('open');
      setTimeout(() => document.getElementById('f-title').focus(), 50);
    }
    window.openModal = openModal;

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }
    window.closeModal = closeModal;

    async function saveItem() {
      const title   = document.getElementById('f-title').value.trim();
      const type    = document.getElementById('f-type').value;
      const subject = document.getElementById('f-subject').value.trim();
      const date    = document.getElementById('f-date').value;
      const notes   = document.getElementById('f-notes').value.trim();
      if (!title || !date) { alert('Preencha pelo menos o título e a data.'); return; }

      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = 'Salvando...';

      try {
        await addDoc(colRef, { title, type, subject, date, notes, createdAt: Date.now() });
        closeModal();
      } catch(e) {
        alert('Erro ao salvar. Tente novamente.');
        console.error(e);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Salvar';
      }
    }
    window.saveItem = saveItem;

    async function deleteItem(id) {
      if (!confirm('Remover este item?')) return;
      try {
        await deleteDoc(doc(db, "agenda", id));
      } catch(e) {
        alert('Erro ao remover.');
        console.error(e);
      }
    }

    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
